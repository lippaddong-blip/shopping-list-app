<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 28px 24px 20px;
      color: #fff;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header .stats {
      margin-top: 6px;
      font-size: 0.85rem;
      opacity: 0.85;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px 20px 0;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #667eea;
    }

    .input-area button {
      padding: 12px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      line-height: 1;
    }

    .input-area button:hover { background: #5a6fd6; }
    .input-area button:active { transform: scale(0.95); }

    .filters {
      display: flex;
      gap: 6px;
      padding: 14px 20px 0;
    }

    .filters button {
      padding: 6px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      background: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      color: #64748b;
      transition: all 0.15s;
    }

    .filters button.active {
      background: #667eea;
      border-color: #667eea;
      color: #fff;
    }

    .list {
      list-style: none;
      padding: 16px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      transition: all 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:hover { border-color: #c7d2fe; background: #fafafe; }

    .item.checked {
      background: #f8fafc;
      border-color: #e2e8f0;
      opacity: 0.65;
    }

    .check-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #cbd5e1;
      background: #fff;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      transition: all 0.15s;
    }

    .item.checked .check-btn {
      background: #22c55e;
      border-color: #22c55e;
      color: #fff;
    }

    .check-btn:hover { transform: scale(1.1); }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #1e293b;
      word-break: break-all;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e1;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .delete-btn:hover { color: #ef4444; background: #fee2e2; }

    .empty {
      text-align: center;
      padding: 40px 0;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .empty .icon { font-size: 2.5rem; margin-bottom: 10px; }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px 20px;
      border-top: 1px solid #f1f5f9;
      margin-top: 4px;
    }

    .footer span { font-size: 0.8rem; color: #94a3b8; }

    .clear-btn {
      background: none;
      border: none;
      font-size: 0.8rem;
      color: #94a3b8;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .clear-btn:hover { color: #ef4444; background: #fee2e2; }
    .clear-btn:disabled { opacity: 0.4; cursor: default; }
    .clear-btn:disabled:hover { color: #94a3b8; background: none; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>쇼핑리스트</h1>
    <div class="stats" id="stats">항목 없음</div>
  </div>

  <div class="input-area">
    <input id="newItem" type="text" placeholder="아이템을 입력하세요..." maxlength="80" />
    <button id="addBtn" title="추가">+</button>
  </div>

  <div class="filters">
    <button class="active" data-filter="all">전체</button>
    <button data-filter="active">미완료</button>
    <button data-filter="done">완료</button>
  </div>

  <ul class="list" id="list"></ul>

  <div class="footer">
    <span id="footerInfo"></span>
    <button class="clear-btn" id="clearDone">완료 항목 삭제</button>
  </div>
</div>

<script>
  let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');
  let filter = 'all';

  const listEl    = document.getElementById('list');
  const input     = document.getElementById('newItem');
  const addBtn    = document.getElementById('addBtn');
  const statsEl   = document.getElementById('stats');
  const footerEl  = document.getElementById('footerInfo');
  const clearBtn  = document.getElementById('clearDone');
  const filterBtns = document.querySelectorAll('.filters button');

  function save() {
    localStorage.setItem('shoppingList', JSON.stringify(items));
  }

  function render() {
    const total   = items.length;
    const done    = items.filter(i => i.checked).length;
    const active  = total - done;

    statsEl.textContent = total === 0
      ? '항목 없음'
      : `${done}/${total} 완료`;

    footerEl.textContent = active > 0
      ? `${active}개 남음`
      : total > 0 ? '모두 완료!' : '';

    clearBtn.disabled = done === 0;

    const visible = items.filter(i => {
      if (filter === 'active') return !i.checked;
      if (filter === 'done')   return i.checked;
      return true;
    });

    listEl.innerHTML = '';

    if (visible.length === 0) {
      listEl.innerHTML = `
        <div class="empty">
          <div class="icon">${filter === 'done' ? '✅' : '🛒'}</div>
          <div>${filter === 'done' ? '완료된 항목이 없습니다' : filter === 'active' ? '미완료 항목이 없습니다' : '아이템을 추가해보세요'}</div>
        </div>`;
      return;
    }

    visible.forEach(item => {
      const li = document.createElement('li');
      li.className = 'item' + (item.checked ? ' checked' : '');
      li.innerHTML = `
        <button class="check-btn" data-id="${item.id}" title="${item.checked ? '미완료로 변경' : '완료로 표시'}">
          ${item.checked ? '✓' : ''}
        </button>
        <span class="item-text">${escHtml(item.text)}</span>
        <button class="delete-btn" data-id="${item.id}" title="삭제">✕</button>
      `;
      listEl.appendChild(li);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addItem() {
    const text = input.value.trim();
    if (!text) return;
    items.unshift({ id: Date.now(), text, checked: false });
    input.value = '';
    save();
    render();
    input.focus();
  }

  addBtn.addEventListener('click', addItem);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

  listEl.addEventListener('click', e => {
    const checkBtn  = e.target.closest('.check-btn');
    const deleteBtn = e.target.closest('.delete-btn');

    if (checkBtn) {
      const id = Number(checkBtn.dataset.id);
      const item = items.find(i => i.id === id);
      if (item) { item.checked = !item.checked; save(); render(); }
    }

    if (deleteBtn) {
      const id = Number(deleteBtn.dataset.id);
      items = items.filter(i => i.id !== id);
      save();
      render();
    }
  });

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  clearBtn.addEventListener('click', () => {
    items = items.filter(i => !i.checked);
    save();
    render();
  });

  render();
</script>
</body>
</html>
